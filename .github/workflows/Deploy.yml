name: Deploy

permissions:
    contents: write
on:
    workflow_dispatch:
        inputs:
            version:
                description: 'The version to deploy'
                required: true
                type: string
    workflow_call:
        inputs:
            version:
                description: 'The version to deploy'
                required: true
                type: string

jobs:
    all:
        strategy:
            matrix:
                runner:
                    -   name: "Ubuntu (aarch64)"
                        arch: aarch64
                        id: ubuntu-24.04-arm
                        badge: Linux-aarch64

                    -   name: "Ubuntu (x86_64)"
                        arch: x86_64
                        id: ubuntu-24.04
                        badge: Linux-x86_64

                    -   name: "macOS"
                        arch: arm64
                        id: macos-26
                        badge: macOS

        runs-on: ${{ matrix.runner.id }}
        name: ${{ matrix.runner.name }}
        steps:
            -   name: 💝 Setup R2 💝
                uses: rarestype/r2-setup-action@v1
                with:
                    cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
                    r2-access-key-id: ${{ secrets.R2_ACCESS_KEY }}
                    r2-access-key: ${{ secrets.R2_ACCESS_SECRET }}

            -   name: 💝 Checkout repository 💝
                uses: actions/checkout@v6


            -   name: 💝 Install Swift 💝
                uses: rarestype/swift-install-action@v1
                if: runner.os != 'macOS'
                with:
                    swift-release: 6.3.1-RELEASE

            -   name: 💝 Select Xcode 26.4 💝
                if: runner.os == 'macOS'
                run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer


            -   name: 💝 Build 💝
                if: runner.os != 'macOS'
                run: |
                    swift build -c release \
                        --static-swift-stdlib \
                        --product wasm-profile-exporter

            -   name: 💝 Build 💝
                if: runner.os == 'macOS'
                run: |
                    swift build -c release \
                        --product wasm-profile-exporter


            -   name: 💝 Deploy 💝
                uses: rarestype/r2-release-action@v1
                with:
                    include: wasm-profile-exporter
                    archive: wasm-profile-exporter.tar.gz
                    version: ${{ inputs.version }}
                    bucket: rarest

            -   name: 💝 Update badge 💝
                uses: rarestype/rarestbadge@v1
                if: always()
                with:
                    badge: SemanticRelease/${{ matrix.runner.badge }}
                    title: Release
